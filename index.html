<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Фізика - Інтерактивний навчальний посібник</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            position: relative;
            background: #8B7355;
        }

        /* Фонові формули (навколо книжки) */
        .physics-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            font-size: 3rem;
            color: rgba(139, 115, 85, 0.15);
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            padding: 20px;
        }

        /* Книжка-обкладинка - ПОРТРЕТНА (вужча) */
        .book-cover {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: linear-gradient(135deg, #1a3a5c 0%, #0d2137 100%);
            border-radius: 15px 10px 10px 15px;
            box-shadow: 
                25px 25px 50px rgba(0,0,0,0.5),
                -8px 0 20px rgba(0,0,0,0.3),
                inset -1px 0 0 rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* Імітація корінця книги */
        .book-spine {
            position: absolute;
            left: 0;
            top: 0;
            width: 45px;
            height: 100%;
            background: linear-gradient(90deg, #0a1525 0%, #1a2a4a 50%, #0a1525 100%);
            border-radius: 12px 0 0 12px;
            z-index: 2;
            box-shadow: inset -2px 0 0 rgba(255,255,255,0.1);
        }

        /* Основний вміст обкладинки */
        .cover-content {
            position: relative;
            padding: 60px 50px 60px 90px;
            text-align: center;
            z-index: 1;
        }

        /* Блок з Міністерством */
        .top-ministry {
            margin-bottom: 2rem;
            position: relative;
        }

        .ministry {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 0.5rem;
            font-weight: 500;
            text-transform: uppercase;
        }

        .college {
            font-size: 1rem;
            font-weight: 700;
            color: #d4af37;
            margin-bottom: 0.35rem;
        }

        .university {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.5);
            font-style: normal;
            line-height: 1.4;
        }

        /* Основний заголовок */
        .main-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            color: #d4af37;
            margin: 1.5rem 0 0.5rem;
            letter-spacing: 4px;
            text-shadow: 0 0 25px rgba(212,175,55,0.3);
            position: relative;
        }

        /* Декоративна лінія */
        .title-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d4af37, #d4af37, transparent);
            margin: 15px auto;
        }

        /* Підзаголовок */
        .subtitle {
            font-size: 1rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 1rem;
            font-weight: 400;
            letter-spacing: 1.5px;
        }

        /* Великий атом */
        .main-atom {
            font-size: 5rem;
            margin: 1rem 0;
            animation: pulse 3s infinite;
            filter: drop-shadow(0 0 15px rgba(192,192,192,0.3));
            color: #c0c0c0;
            display: inline-block;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); text-shadow: 0 0 0px rgba(192,192,192,0); }
            50% { transform: scale(1.08); text-shadow: 0 0 30px rgba(192,192,192,0.4); }
        }

        /* Декоративна рамка навколо атома */
        .atom-frame {
            display: inline-block;
            padding: 12px 30px;
            border: 2px solid rgba(192,192,192,0.4);
            border-radius: 80px;
            margin: 10px 0;
        }

        /* Автор */
        .author {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.12);
            display: inline-block;
            width: auto;
        }

        .author-label {
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
            color: rgba(255,255,255,0.5);
        }

        .author-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #d4af37;
            letter-spacing: 1px;
        }

        /* Декоративні елементи книжки (кути) */
        .corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: rgba(212,175,55,0.25);
            border-style: solid;
            border-width: 0;
            opacity: 0.3;
        }

        .corner-tl {
            top: 15px;
            left: 15px;
            border-top-width: 2px;
            border-left-width: 2px;
        }

        .corner-tr {
            top: 15px;
            right: 15px;
            border-top-width: 2px;
            border-right-width: 2px;
        }

        .corner-bl {
            bottom: 15px;
            left: 15px;
            border-bottom-width: 2px;
            border-left-width: 2px;
        }

        .corner-br {
            bottom: 15px;
            right: 15px;
            border-bottom-width: 2px;
            border-right-width: 2px;
        }

        /* Стрілка праворуч */
        .next-arrow {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            text-align: center;
            z-index: 10;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .next-arrow:hover {
            transform: translateY(-50%) scale(1.15);
            opacity: 1;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left-width: 35px;
            border-left-style: solid;
            border-left-color: #d4af37;
            border-top: 22px solid transparent;
            border-bottom: 22px solid transparent;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
        }

        .arrow-text {
            font-size: 10px;
            color: #d4af37;
            margin-top: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Імітація сторінок знизу */
        .page-edges {
            position: absolute;
            bottom: -10px;
            left: 10px;
            right: 10px;
            height: 10px;
            background: linear-gradient(180deg, #e8e0d0 0%, #c4b8a8 100%);
            border-radius: 0 0 5px 5px;
            z-index: 0;
        }

        .page-edges::before,
        .page-edges::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 7px;
            right: 7px;
            height: 5px;
            background: #d4c8b8;
            border-radius: 0 0 3px 3px;
        }

        .page-edges::after {
            bottom: -8px;
            left: 5px;
            right: 5px;
            height: 4px;
            background: #c0b4a4;
        }

        /* ============================================ */
        /* АДАПТАЦІЯ ДЛЯ МОБІЛЬНИХ */
        /* ============================================ */
        @media (max-width: 768px) {
            body {
                padding: 20px 15px;
            }
            
            .book-cover {
                max-width: 100%;
            }
            
            .cover-content {
                padding: 25px 25px 30px 50px;
            }
            
            .book-spine {
                width: 30px;
            }
            
            .top-ministry {
                margin-bottom: 1.2rem;
            }
            
            .ministry {
                font-size: 0.65rem;
            }
            
            .college {
                font-size: 0.85rem;
            }
            
            .university {
                font-size: 0.65rem;
            }
            
            .main-title {
                font-size: 2rem;
                margin: 1rem 0 0.3rem;
            }
            
            .title-line {
                width: 60px;
                margin: 10px auto;
            }
            
            .subtitle {
                font-size: 0.85rem;
                margin-bottom: 0.8rem;
            }
            
            .main-atom {
                font-size: 3.5rem;
                margin: 0.5rem 0;
            }
            
            .atom-frame {
                padding: 8px 20px;
                margin: 5px 0;
            }
            
            .author {
                margin-top: 1.2rem;
                padding-top: 1rem;
            }
            
            .author-label {
                font-size: 0.75rem;
            }
            
            .author-name {
                font-size: 0.95rem;
            }
            
            .corner {
                width: 30px;
                height: 30px;
                opacity: 0.2;
            }
            
            .corner-tl, .corner-tr {
                top: 10px;
            }
            
            .corner-tl, .corner-bl {
                left: 10px;
            }
            
            .corner-tr, .corner-br {
                right: 10px;
            }
            
            .corner-bl, .corner-br {
                bottom: 10px;
            }
            
            .next-arrow {
                right: 8px;
            }
            
            .triangle {
                border-left-width: 25px;
                border-top-width: 16px;
                border-bottom-width: 16px;
            }
            
            .arrow-text {
                font-size: 8px;
            }
        }

        @media (max-width: 480px) {
            .cover-content {
                padding: 20px 18px 25px 42px;
            }
            
            .book-spine {
                width: 25px;
            }
            
            .main-title {
                font-size: 1.8rem;
            }
            
            .subtitle {
                font-size: 0.75rem;
            }
            
            .main-atom {
                font-size: 2.8rem;
            }
            
            .triangle {
                border-left-width: 22px;
                border-top-width: 14px;
                border-bottom-width: 14px;
            }
            
            .corner {
                width: 25px;
                height: 25px;
            }
        }
    </style>
</head>
<body>

    <!-- Фонові формули -->
    <div class="physics-bg">
        E = mc² &nbsp;&nbsp; F = ma &nbsp;&nbsp; λ = c/f &nbsp;&nbsp; U = RI &nbsp;&nbsp; ∇·E = ρ/ε₀
    </div>

    <!-- Книжка-обкладинка -->
    <div class="book-cover">
        <div class="book-spine"></div>
        
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>
        
        <div class="cover-content">
            <div class="top-ministry">
                <div class="ministry">МІНІСТЕРСТВО ОБОРОНИ УКРАЇНИ</div>
                <div class="college">ВІЙСЬКОВИЙ КОЛЕДЖ СЕРЖАНТСЬКОГО СКЛАДУ</div>
                <div class="university">ХАРКІВСЬКОГО НАЦІОНАЛЬНОГО УНІВЕРСИТЕТУ ПОВІТРЯНИХ СИЛ<br>імені ІВАНА КОЖЕДУБА</div>
            </div>
            
            <h1 class="main-title">ФІЗИКА</h1>
            <div class="title-line"></div>
            <div class="subtitle">Інтерактивний навчальний посібник</div>
            
            <div class="atom-frame">
                <div class="main-atom">⚛️</div>
            </div>
            
            <div class="author">
                <div class="author-label">👨‍💻 Автор і розробник:</div>
                <div class="author-name">Ігор Морміль</div>
            </div>
        </div>
        
        <div class="page-edges"></div>
        
        <div class="next-arrow" onclick="goToZmist()">
            <div class="triangle"></div>
            <div class="arrow-text">ГОРТАТИ</div>
        </div>
    </div>

    <script>
        function goToZmist() {
            window.location.href = '/zmist';
        }
        
        let touchStartX = 0;
        
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        
        document.addEventListener('touchend', (e) => {
            const touchEndX = e.changedTouches[0].screenX;
            if (touchStartX - touchEndX > 50) {
                goToZmist();
            }
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                goToZmist();
            }
        });
    </script>
</body>
</html>
